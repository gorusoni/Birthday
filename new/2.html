<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Happy Birthday Moto</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: linear-gradient(135deg, #fff0f5, #ffe4e1);
      font-family:'Courier New', Courier, monospace;
      animation: fadeIn 2s ease-in;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .container {
      max-width: 900px;
      margin: 50px auto;
      background-color: #fffaf0;
      border-radius: 15px;
      padding: 30px;
      box-shadow: 0 0 30px rgba(255, 105, 180, 0.5);
      text-align: center;
      animation: slideUp 1.5s ease-out;
    }

    @keyframes slideUp {
      from {
        transform: translateY(100px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    img {
      width: 150px;
      height: auto;
      border-radius: 15px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }

    .image-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .image-row p {
      flex: 1;
      margin: 0 20px;
      font-size: 1.8em;
      color: #ff1493;
      font-weight: bold;
      text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
    }

    p {
      font-size: 1.1em;
      color: #444;
      text-align: left;
      line-height: 1.8em;
    }

    #last {
      font-family: 'Segoe Script', cursive;;
      text-align: center;
      margin-top: 30px;
      font-size: 1.3em;
      color: #d63384;
    }

    .reply-section {
      margin-top: 40px;
    }

    .reply-section p {
      font-size: 1.2em;
      color: #ff1493;
      font-weight: bold;
    }

    .reply-links {
      display: flex;
      justify-content: center;
      gap: 30px;
      margin-top: 15px;
    }

    .reply-links a {
      text-decoration: none;
      background-color: #ff69b4;
      color: white;
      padding: 10px 20px;
      border-radius: 8px;
      font-weight: bold;
      transition: all 0.3s ease;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }

    .reply-links a:hover {
      background-color: #ff85c1;
      transform: scale(1.05);
    }
  </style>
</head>
<body>
<script>
  let name = prompt("Enter password");
  if (name) name = name.trim().toLowerCase();
// you can change password from here
  const allowedNames = ["12345678"];

  if (allowedNames.includes(name)) {
    document.title = `Happy Birthday Moto ❤️😊`;
    document.body.innerHTML = `
      <div class="container">
        <div class="image-row">
          <img src="brosis.gif" alt="Left image">
          <p>This is for you Moto 💌</p>
          <img src="brolap.gif" alt="Right image">
        </div>

        <p> Write a paragraph for her
        </p>

        <p id="last">
         you can write small paragraph here 
          <strong>And once again , Happy Birthday 😊😊</strong>
        </p>

        <div class="reply-section">
          <p>Reply or message me if you felt anything either than thank you 🥹❤️:</p>
          <div class="reply-links">
          <!--gave your mail or mobile below for her reply-->
            <a href="https://wa.me/+91.........." target="_blank">WhatsApp</a>
            <a href="mailto:..........@gmail.com">Email</a>
          </div>
        </div>
      </div>
    `;
  } else {
    alert("Password is not Correct !!. or You are not Moto . This is only for My Moto 😎");
  }
</script>
</body>
</html>
